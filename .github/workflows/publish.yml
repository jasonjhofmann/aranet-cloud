name: Publish to PyPI

# Trusted publishing (PyPI OIDC) — no token stored anywhere. PyPI must have
# this repo + workflow registered as a trusted publisher for the
# `aranet-cloud` project (Manage → Publishing): owner jasonjhofmann,
# repository aranet-cloud, workflow publish.yml, environment pypi.
on:
  release:
    types: [published]
  # Manual trigger for publishing a version whose tag predates this
  # workflow file (e.g. v0.2.0): run from main with the matching
  # pyproject version.
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write # OIDC token for PyPI trusted publishing
      contents: read
    steps:
      # Actions in the release path are pinned to commit SHAs (not mutable
      # tags) so a compromised/retagged action can't inject code into the
      # publish flow. .github/dependabot.yml keeps these pins current.
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0

      - name: Build sdist and wheel
        run: uv build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1
