name: CI

# Lint, type-check, and test on every push to main and every PR. This is the
# gate CONTRIBUTING.md/README.md reference — without it, a PR could go green
# while breaking ruff, mypy --strict, or the test suite.
on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Create venv and install (editable + dev extras)
        run: |
          uv venv
          uv pip install -e ".[dev]"

      - name: Ruff (lint)
        run: uv run ruff check .

      - name: Mypy (strict)
        run: uv run mypy src

      - name: Pytest
        run: uv run pytest -q
